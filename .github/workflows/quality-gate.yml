name: Quality Gate

# Delta coverage gate via the difftron Action (github.com/marketplace/actions/difftron-delta-coverage-gate).
# Holds the lines changed in a PR to a coverage threshold and posts a sticky comment.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # lets difftron post a results comment

jobs:
  delta-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so difftron can diff against the base branch

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Test with coverage
        # vitest + @vitest/coverage-v8 -> coverage/lcov.info
        run: npx vitest run --coverage --coverage.reporter=lcov

      - uses: swantron/difftron@v1
        with:
          coverage: coverage/lcov.info
          threshold: '80'
          comment-pr: 'true'
          # Report-only for now: comments without blocking merges.
          # Flip to 'true' once this repo's changed-line coverage is where you want it.
          fail-on-error: 'false'
